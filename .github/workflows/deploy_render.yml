name: Deploy rct-backend to Render

on:
  push:
    branches:
      - release/v1.0.0

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python (for tests, lint etc.)
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        # Optional: add your test commands
        run: |
          echo "No tests yet" 

      - name: Build Docker image
        run: |
          docker build -t rct-backend:latest .

      - name: Trigger Render deploy via hook
        if: success()    # only deploy if prior steps succeeded
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST $RENDER_DEPLOY_HOOK_URL
